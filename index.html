<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sayang 🎂</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: 'Quicksand', 'Nunito', Arial, sans-serif;
      background: #ffc8d6;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 12px max(78px, env(safe-area-inset-bottom));
    }

    body::-webkit-scrollbar {
      display: none;
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: radial-gradient(circle at center, #ffe3eb 0%, #ffc8d6 45%, #ff9fbd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      transition: opacity 1.55s cubic-bezier(.22, 1, .36, 1), transform 1.9s cubic-bezier(.22, 1, .36, 1), filter 1.9s cubic-bezier(.22, 1, .36, 1);
    }

    .intro-screen.hide {
      opacity: 0;
      transform: scale(1.18);
      filter: blur(10px);
      pointer-events: none;
    }

    .intro-content {
      width: min(88vw, 430px);
      animation: introZoom 1.35s cubic-bezier(.22, 1, .36, 1) both;
    }

    .intro-heart {
      font-size: 72px;
      margin-bottom: 18px;
      animation: pulseHeart 2.4s ease-in-out infinite;
    }

    .intro-title {
      font-family: 'Pacifico', cursive;
      font-size: 36px;
      font-weight: 400;
      line-height: 1.28;
      color: #ff2c68;
      margin-bottom: 16px;
      text-shadow: 0 3px 0 rgba(255,255,255,.55);
    }

    .intro-text {
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.45;
      color: #222;
      margin-bottom: 28px;
    }

    .intro-mini {
      font-size: 14px;
      font-weight: 900;
      color: #777;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .intro-btn {
      width: min(100%, 330px);
      background: #ff2c68;
      color: white;
      border: 4px solid #222;
      border-radius: 16px;
      padding: 16px 18px;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 7px 8px 0 #191919;
    }

    @keyframes introZoom {
      from { opacity: 0; transform: scale(.86) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pageZoomIn {
      from { opacity: 0; transform: scale(.88) translateY(18px); filter: blur(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.14); }
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .balloons {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .balloon {
      position: absolute;
      bottom: -120px;
      font-size: 38px;
      opacity: .55;
      animation: balloonUp 16s linear infinite;
      filter: drop-shadow(0 5px 0 rgba(0,0,0,.12));
    }

    @keyframes balloonUp {
      0% { transform: translateY(0) translateX(0) rotate(-4deg); opacity: 0; }
      12% { opacity: .55; }
      50% { transform: translateY(-55vh) translateX(22px) rotate(5deg); }
      100% { transform: translateY(-125vh) translateX(-18px) rotate(-5deg); opacity: 0; }
    }

    .progress {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      gap: 7px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, .48);
      border: 2px solid rgba(34,34,34,.18);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity .8s ease;
    }

    body.started .progress { opacity: 1; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 44, 104, .28);
      transition: transform .35s ease, background .35s ease;
    }

    .dot.active {
      background: #ff2c68;
      transform: scale(1.45);
    }

    .heart {
      position: absolute;
      color: #ff5b8a;
      opacity: 0.55;
      animation: float 13s linear infinite;
      font-size: 18px;
    }

    @keyframes float {
      from { transform: translateY(110vh) rotate(0deg); }
      to { transform: translateY(-15vh) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(94vw, 760px);
      max-height: calc(100dvh - 115px);
      min-height: 270px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: white;
      border: 4px solid #222;
      border-radius: 24px;
      box-shadow: 12px 14px 0 #191919;
      padding: 30px clamp(18px, 4vw, 44px);
      text-align: center;
      opacity: 0;
      transform: scale(.65);
    }

    body.started .card {
      animation: pageZoomIn 1.65s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .card::-webkit-scrollbar {
      display: none;
    }

    @keyframes pop {
      from { transform: scale(.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .card > * {
      animation: contentFade .85s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes contentFade {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .small-title {
      color: #ff2c68;
      font-family: 'Quicksand', Arial, sans-serif;
      font-weight: 900;
      margin-bottom: 22px;
      font-size: 14px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-family: 'Nunito', 'Quicksand', Arial, sans-serif;
      font-size: 26px;
      line-height: 1.25;
      margin-bottom: 28px;
      letter-spacing: -.3px;
      color: #24151a;
    }

    p {
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    .typing {
      min-height: 86px;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 21px;
      font-weight: 800;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      border: 4px solid #222;
      border-radius: 14px;
      padding: 15px 18px;
      margin: 10px 0;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2px;
      cursor: pointer;
      box-shadow: 6px 7px 0 #191919;
      transition: transform .24s ease, box-shadow .24s ease, background .24s ease;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.45), transparent);
      transform: translateX(-120%);
      transition: transform .75s ease;
    }

    button:hover::after { transform: translateX(120%); }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 7px 9px 0 #191919, 0 18px 28px rgba(255, 44, 104, .12);
    }

    button:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 3px 0 #191919;
    }

    .pink { background: #ff2c68; color: white; }
    .blue { background: #9feaff; color: #222; }
    .green { background: #22d56d; color: white; }
    .white { background: white; color: #222; }
    .cyan { background: #18e4d2; color: #111; }
    .purple { background: #b980ff; color: white; }

    .letters {
      display: grid;
      grid-template-columns: repeat(3, 68px);
      gap: 14px;
      justify-content: center;
      margin: 20px 0 24px;
    }

    .letter {
      width: 68px;
      height: 60px;
      border: 4px solid #222;
      border-radius: 12px;
      background: white;
      font-size: 26px;
      font-family: 'Nunito', 'Quicksand', Arial, sans-serif;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 5px 0 #191919;
      cursor: pointer;
      user-select: none;
      transition: transform .25s ease, background .25s ease;
    }

    .letter:hover {
      transform: translateY(-5px) rotate(-2deg);
      background: #fff0f5;
    }

    .answer {
      min-height: 40px;
      font-family: 'Nunito', 'Quicksand', Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: 900;
      color: #ff2c68;
      margin-bottom: 8px;
    }

    .envelope-scene {
      padding: 8px 0 2px;
      cursor: pointer;
      animation: sceneSoftIn 1.15s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes sceneSoftIn {
      from { opacity: 0; transform: translateY(20px) scale(.96); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .gift-title {
      font-family: 'Pacifico', cursive;
      font-size: 31px;
      font-weight: 400;
      line-height: 1.25;
      color: #ff2c68;
      margin-bottom: 8px;
      text-shadow: 0 3px 0 rgba(255,255,255,.65);
      animation: softFloatTitle 3.2s ease-in-out infinite;
    }

    @keyframes softFloatTitle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .gift-subtitle {
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #8f6671;
      margin-bottom: 18px;
      letter-spacing: .4px;
    }

    .gift-caption {
      font-size: 17px;
      color: #3a242b;
      margin-bottom: 18px;
      animation: captionPulse 2.6s ease-in-out infinite;
    }

    @keyframes captionPulse {
      0%, 100% { opacity: .78; }
      50% { opacity: 1; }
    }

    .envelope-box {
      width: 250px;
      height: 170px;
      margin: 10px auto 24px;
      position: relative;
      perspective: 900px;
      animation: envelopeBreath 4.6s ease-in-out infinite;
      transition: transform .45s cubic-bezier(.22, 1, .36, 1), filter .45s ease;
    }

    .envelope-box:hover {
      transform: translateY(-5px) scale(1.02);
      filter: drop-shadow(0 10px 12px rgba(255,44,104,.18));
    }

    @keyframes envelopeBreath {
      0%, 100% { transform: translateY(0) rotate(-.4deg); }
      50% { transform: translateY(-7px) rotate(.6deg); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-.4deg); }
      50% { transform: rotate(.6deg); }
    }

    .letter-paper {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 42px;
      height: 105px;
      background: linear-gradient(180deg, #fff 0%, #fff7fa 100%);
      border: 4px solid #222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      z-index: 1;
      transition: transform 1.45s cubic-bezier(.22, 1, .36, 1), top 1.45s cubic-bezier(.22, 1, .36, 1);
    }

    .envelope-box.open .letter-paper {
      top: -56px;
      transform: translateY(-8px) scale(1.035);
    }

    .envelope-back,
    .envelope-front {
      position: absolute;
      inset: 0;
      border: 4px solid #222;
      border-radius: 12px;
      background: white;
      box-shadow: 7px 9px 0 #191919;
    }

    .envelope-back { z-index: 0; }

    .envelope-flap {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 88px;
      background: #fff;
      border: 4px solid #222;
      border-bottom: 0;
      border-radius: 12px 12px 0 0;
      transform-origin: top;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 4;
      transition: transform 1.35s cubic-bezier(.22, 1, .36, 1);
    }

    .envelope-box.open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 0;
    }

    .envelope-front {
      z-index: 3;
      overflow: hidden;
    }

    .envelope-front::before,
    .envelope-front::after {
      content: '';
      position: absolute;
      bottom: -4px;
      width: 52%;
      height: 100%;
      background: white;
      border-top: 4px solid #222;
    }

    .envelope-front::before {
      left: -4px;
      transform: skewY(35deg);
      transform-origin: bottom left;
    }

    .envelope-front::after {
      right: -4px;
      transform: skewY(-35deg);
      transform-origin: bottom right;
    }

    .bear {
      position: absolute;
      right: -18px;
      top: -44px;
      width: 76px;
      height: 94px;
      background: #9d6674;
      border: 4px solid #222;
      border-radius: 45px 45px 28px 28px;
      z-index: 6;
      animation: peek 2.8s ease-in-out infinite;
    }

    @keyframes peek {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .bear::before, .bear::after {
      content: '';
      position: absolute;
      top: -14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #9d6674;
      border: 4px solid #222;
    }
    .bear::before { left: -10px; }
    .bear::after { right: -10px; }
    .face { position: absolute; inset: 20px 0 0; font-size: 22px; }

    input {
      width: 100%;
      border: 4px solid #222;
      border-radius: 12px;
      padding: 16px;
      font-size: 18px;
      font-family: 'Quicksand', Arial, sans-serif;
      text-align: center;
      margin: 12px 0;
      outline: none;
    }

    .photo-frame {
      width: 185px;
      height: 185px;
      margin: 0 auto 22px;
      border: 4px solid #222;
      border-radius: 22px;
      background: linear-gradient(135deg, #ffe6ee, #ffd1df);
      box-shadow: 7px 8px 0 #191919;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      overflow: hidden;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reasons {
      text-align: left;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 15.8px;
      font-weight: 800;
      line-height: 1.45;
      margin: 0 0 18px 0;
      columns: 2;
      column-gap: 28px;
    }

    @media (max-width: 560px) {
      body {
        align-items: center;
        justify-content: center;
        padding: max(14px, env(safe-area-inset-top)) 12px max(78px, env(safe-area-inset-bottom));
      }

      .card {
        width: min(94vw, 430px);
        max-height: calc(100dvh - 105px);
      }

      .reasons {
        columns: 1;
        font-size: 14.5px;
        line-height: 1.42;
      }

      h1 { font-size: 22px; }
      p { font-size: 17px; }
      .typing { font-size: 18px; }
    }

    .confetti {
      position: fixed;
      width: 8px;
      height: 14px;
      top: -20px;
      animation: fall 5.2s linear forwards;
      z-index: 5;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); }
    }

    .hug {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(.2);
      font-size: 78px;
      z-index: 20;
      animation: hugPop 1.9s cubic-bezier(.22, 1, .36, 1) forwards;
      pointer-events: none;
    }

    @keyframes hugPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2); }
      45% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.7); }
    }

    .tap-pop {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      font-size: 24px;
      animation: tapPop 1s ease forwards;
    }

    @keyframes tapPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.5); }
      30% { opacity: 1; transform: translate(-50%, -80%) scale(1.15); }
      100% { opacity: 0; transform: translate(-50%, -145%) scale(.8); }
    }

    .shake {
      animation: softShake .48s ease;
    }

    @keyframes softShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-1deg); }
      50% { transform: translateX(7px) rotate(1deg); }
      75% { transform: translateX(-4px) rotate(-.5deg); }
    }

    .choice-note {
      font-family: 'Quicksand', Arial, sans-serif;
      font-weight: 800;
      color: #ff2c68;
      min-height: 28px;
      margin: 4px 0 8px;
      opacity: .9;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: white;
      padding: 12px 18px;
      border-radius: 100px;
      font-family: 'Quicksand', Arial, sans-serif;
      font-weight: 700;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <div class="intro-screen" id="introScreen">
    <div class="intro-content">
      <div class="intro-heart">🎂🤍</div>
      <div class="intro-mini">a little birthday surprise</div>
      <div class="intro-title">happy birthday<br>sayanggg</div>
      <div class="intro-text">aku ada sesuatu kecil buat kamu...<br>bukanya pelan-pelan yaa 😋</div>
      <button class="intro-btn" onclick="startOpening()">tap to open ✨</button>
    </div>
  </div>
  <div class="hearts" id="hearts"></div>
  <div class="balloons" id="balloons"></div>
  <main class="card" id="app"></main>
  <div class="progress" id="progress"></div>
  <div class="toast" id="toast">Jangan pilih yang itu 😝</div>

  <script>
    // GANTI BAGIAN INI SESUAI PUNYAMU
    const namaCowok = "Sayang"; // ganti dengan nama cowok kamu
    const namaKamu = "Aku"; // ganti dengan nama kamu
    const umurCowok = 24;
    const nomorWA = "08217738908"; // isi nomor kamu, format 62 tanpa +
    const fotoKalian = ""; // isi link foto, contoh: "foto.jpg" atau kosongkan saja
    const laguRomantis = "music.mp3"; // taruh file lagu satu folder dengan index.html, lalu tulis namanya di sini

    const app = document.getElementById('app');
    const toast = document.getElementById('toast');
    let step = 0;
    let jawaban = "";
    let envelopeOpened = false;
    let audioPlayer;
    let musicPlaying = false;

    const screens = [
      () => `
        <div class="envelope-scene">
          <div class="gift-title">for my birthday boy</div>
          <div class="gift-subtitle">a little letter, just for you 🎂</div>
          <div class="envelope-box ${envelopeOpened ? 'open' : ''}" id="envelopeBox" onclick="openEnvelope()">
            <div class="letter-paper">💗</div>
            <div class="envelope-back"></div>
            <div class="envelope-flap"></div>
            <div class="envelope-front"></div>
            <div class="bear"><div class="face">•ᴥ•</div></div>
          </div>
          <p class="gift-caption">${envelopeOpened ? 'kadonya udah kebuka nih, lanjut yaa 🎁' : 'tap amplopnya dulu pelan-pelan yaa 🎁'}</p>
          <button class="pink" onclick="openEnvelope()">${envelopeOpened ? 'LANJUT ➜' : 'BUKA KADO'}</button>
        </div>
      `,
      () => `
        <h1>Sebelum mulai...</h1>
        <p>Nyalain musiknya dulu biar vibes ulang tahunnya makin manis 🎵</p>
        <button class="purple" onclick="startMusic()">NYALAIN MUSIK 🎵</button>
        <button class="pink" onclick="next()">LANJUT TANPA MUSIK ➜</button>
      `,
      () => `
        <div class="photo-frame">${fotoKalian ? `<img src="${fotoKalian}" alt="foto kita">` : '💑'}</div>
        <h1>Happy Birthday ke-${umurCowok}, ${namaCowok}! 🎂</h1>
        <p>Ini kejutan kecil dari ${namaKamu}, khusus buat cowok paling spesial.</p>
        <button class="pink" onclick="nextTyping()">BUKA PESAN 💌</button>
      `,
      () => `
        <div class="small-title">PESAN KECIL</div>
        <div class="typing" id="typingText"></div>
        <button class="pink" id="typingBtn" style="display:none" onclick="next()">MULAI MISI 💗</button>
      `,
      () => `
        <div class="small-title">MISI 1</div>
        <h1>Susun Kata "BIRTHDAY" :</h1>
        <div class="answer" id="answer">${jawaban}</div>
        <div class="letters">
          ${['B','I','R','T','H','D','A','Y'].map(l => `<div class="letter" onclick="pickLetter('${l}', this)">${l}</div>`).join('')}
        </div>
        <button class="pink" onclick="checkWord()">CEK JAWABAN 💗</button>
      `,
      () => `
        <p>Sebelum lanjut misi ini, tolong jujur jawabnya cinta❤...</p>
        <button class="pink" onclick="next()">LANJUT ➜</button>
      `,
      () => `
        <div class="small-title">MISI 2 (1/3)</div>
        <h1>Siapa yang hari ini ulang tahun ke-24 dan paling ganteng?</h1>
        <div class="choice-note" id="choiceNote">hmm jawab yang bener yaa 😋</div>
        <button class="pink" onclick="sweetChoice('nahhh itu diaa 😎💗')">Pastinya ${namaCowok} 😎</button>
        <button class="white" onclick="badClick()">Gak Bisa! 😝</button>
      `,
      () => `
        <div class="small-title">MISI 2 (2/3)</div>
        <h1>Kamu sayang siapa?</h1>

    function render() {
      app.innerHTML = screens[step]();
      updateProgress();
      if (step === 3) typeMessage();
    }

    function startOpening() {
      const intro = document.getElementById('introScreen');
      intro.classList.add('hide');
      document.body.classList.add('started');
      setTimeout(() => {
        intro.style.display = 'none';
      }, 1900);
    }

    function next() {
      step++;
      render();
    }

    function updateProgress() {
      const progress = document.getElementById('progress');
      if (!progress) return;
      const total = screens.length;
      const dots = Array.from({ length: total }, (_, i) => `<span class="dot ${i <= step ? 'active' : ''}"></span>`).join('');
      progress.innerHTML = dots;
    }

    function sweetChoice(message) {
      const note = document.getElementById('choiceNote');
      if (note) note.textContent = message;
      celebrateMini();
      setTimeout(next, 950);
    }

    function nextTyping() {
      next();
    }

    function openEnvelope() {
      if (!envelopeOpened) {
        envelopeOpened = true;
        render();
        setTimeout(() => celebrate(), 1250);
      } else {
        envelopeOpened = false;
        next();
      }
    }

    function typeMessage() {
      const text = `happy birthday yaa sayanggg 🎂🤍 ga kerasa kamu udah 24 aja. aku cuma mau bilang, makasih udah jadi kamu yang selalu aku banggain. semoga di umur baru ini kamu makin bahagia, makin kuat, rezekinya makin lancar, dan semua yang kamu usahain pelan-pelan jadi nyata. i’m so proud of you, always 💗`; 
      const target = document.getElementById('typingText');
      const btn = document.getElementById('typingBtn');
      let i = 0;
      const timer = setInterval(() => {
        target.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(timer);
          btn.style.display = 'block';
        }
      }, 62);
    }

    function pickLetter(letter, el) {
      jawaban += letter;
      el.style.visibility = 'hidden';
      document.getElementById('answer').textContent = jawaban;
    }

    function checkWord() {
      if (jawaban === 'BIRTHDAY') {
        jawaban = '';
        next();
      } else {
        app.innerHTML = `
          <h1>💔</h1>
          <p>Aduh! Susunannya salah.<br>Pelan-pelan aja sayang!</p>
          <button class="pink" onclick="jawaban=''; render();">ULANGI</button>
        `;
      }
    }

    function badClick() {
      toast.style.display = 'block';
      app.classList.remove('shake');
      void app.offsetWidth;
      app.classList.add('shake');
      popAt(window.innerWidth / 2, window.innerHeight / 2, '😝');
      setTimeout(() => toast.style.display = 'none', 1200);
    }

    function toggleLove() {
      const btn = document.getElementById('switchBtn');
      btn.textContent = 'ON 💗';
      btn.className = 'pink';
      setTimeout(next, 700);
    }

    function sendWA() {
      const isi = document.getElementById('waInput').value.trim();
      if (!isi) {
        badClick();
        return;
      }
      const pesan = encodeURIComponent(`Hai ${namaKamu}, aku sudah buka web ulang tahun dari kamu. Makasih ya, aku sayang kamu ❤️`);
      window.open(`https://wa.me/${nomorWA}?text=${pesan}`, '_blank');
      app.innerHTML = `
        <h1>udah selesaiii 🎂💗</h1>
        <p>makasih yaa udah buka semuanya pelan-pelan. semoga hari ulang tahun kamu jadi sedikit lebih manis hari ini.</p>

    function moveNo() {
      const btn = document.getElementById('noBtn');
      btn.style.position = 'fixed';
      btn.style.width = '130px';
      btn.style.left = Math.random() * (window.innerWidth - 150) + 'px';
      btn.style.top = Math.random() * (window.innerHeight - 70) + 'px';
    }

    function finishLove() {
      celebrate();
      next();
    }

    function virtualHug() {
      const h = document.createElement('div');
      h.className = 'hug';
      h.textContent = '🤗💗';
      document.body.appendChild(h);
      celebrate();
      setTimeout(() => h.remove(), 2100);
    }

    function popAt(x, y, emoji = '💗') {
      const p = document.createElement('div');
      p.className = 'tap-pop';
      p.textContent = emoji;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }

    function celebrateMini() {
      const emojis = ['💗', '✨', '🎂', '🤍'];
      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          popAt(80 + Math.random() * (window.innerWidth - 160), 160 + Math.random() * (window.innerHeight - 320), emojis[Math.floor(Math.random() * emojis.length)]);
        }, i * 55);
      }
    }

    function celebrate() {
      const colors = ['#ff2c68', '#18e4d2', '#ffd166', '#7b61ff', '#35d07f'];
      for (let i = 0; i < 45; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = Math.random() * 1.6 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }
    }

    function startMusic() {
      if (!musicPlaying) {
        audioPlayer = new Audio(laguRomantis);
        audioPlayer.loop = true;
        audioPlayer.volume = 0.45;
        audioPlayer.play().catch(() => {
          alert('Musiknya belum bisa diputar. Pastikan file lagu sudah satu folder dengan index.html');
        });
        musicPlaying = true;
      }
      next();
    }

    function playTone(freq, start, duration) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + start + 0.03);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + start + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + start);
      osc.stop(audioCtx.currentTime + start + duration + 0.05);
    }

    function playMelody() {
      if (!musicPlaying || !audioCtx) return;
      const notes = [523, 659, 784, 659, 698, 784, 880, 784];
      notes.forEach((n, i) => playTone(n, i * 0.45, 0.38));
      setTimeout(playMelody, 3800);
    }

    function makeHearts() {
      const box = document.getElementById('hearts');
      for (let i = 0; i < 32; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = Math.random() > .35 ? '♥' : '✦';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDelay = Math.random() * 12 + 's';
        h.style.fontSize = (10 + Math.random() * 18) + 'px';
        box.appendChild(h);
      }
    }

    function makeBalloons() {
      const box = document.getElementById('balloons');
      const items = ['🎈','🎂','🎁','✨'];
      for (let i = 0; i < 10; i++) {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.textContent = items[i % items.length];
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDelay = Math.random() * 14 + 's';
        b.style.animationDuration = (15 + Math.random() * 8) + 's';
        b.style.fontSize = (26 + Math.random() * 20) + 'px';
        box.appendChild(b);
      }
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('button') || e.target.closest('.letter') || e.target.closest('.envelope-box')) {
        popAt(e.clientX, e.clientY, Math.random() > .5 ? '💗' : '✨');
      }
    });

    makeHearts();
    makeBalloons();
    render();
  </script>
