<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sayang</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Nunito:wght@500;600;700;800&display=swap');

    :root {
      --ink: #21161b;
      --pink: #ff4f86;
      --pink-deep: #ff2c68;
      --pink-soft: #ffe2ec;
      --cream: #fff7d8;
      --purple: #b980ff;
      --cyan: #7ff5e9;
      --shadow: #171717;
      --card: rgba(255, 255, 255, .86);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: 'Quicksand', 'Nunito', Arial, sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 12px max(82px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72) 0 7%, transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(255,214,129,.34) 0 8%, transparent 26%),
        radial-gradient(circle at 78% 80%, rgba(185,128,255,.38) 0 10%, transparent 32%),
        radial-gradient(circle at 16% 88%, rgba(127,245,233,.28) 0 9%, transparent 30%),
        linear-gradient(135deg, #ffe1ea 0%, #ffabc8 35%, #d1bfff 70%, #b4fff5 100%);
    }

    body::-webkit-scrollbar,
    .card::-webkit-scrollbar { display: none; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .26;
      background-image:
        linear-gradient(rgba(255,255,255,.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.55) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      z-index: 0;
    }

    .preloader-screen,
    .love-rain-screen {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.72) 0 8%, transparent 26%),
        radial-gradient(circle at 82% 72%, rgba(185,128,255,.30) 0 10%, transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(127,245,233,.18) 0 10%, transparent 34%),
        linear-gradient(135deg, #ffe3eb 0%, #ffc0d2 44%, #ff93b8 100%);
    }

    .preloader-screen.hide,
    .love-rain-screen.hide {
      opacity: 0;
      transform: scale(1.08);
      filter: blur(10px);
      transition: opacity 1.9s cubic-bezier(.22, 1, .36, 1), transform 2.2s cubic-bezier(.22, 1, .36, 1), filter 2.2s cubic-bezier(.22, 1, .36, 1);
    }

    .loader-card {
      width: min(88vw, 420px);
      padding: 28px 26px;
      border: 3px solid rgba(255,255,255,.28);
      border-radius: 30px;
      background: rgba(31, 23, 35, .38);
      box-shadow: 0 28px 70px rgba(70, 22, 70, .28), inset 0 0 0 1px rgba(255,255,255,.18);
      backdrop-filter: blur(14px);
      text-align: center;
      animation: loaderBreath 3.2s ease-in-out infinite;
    }

    @keyframes loaderBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }

    .loader-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff, #ffeaf2 48%, #fff6c7 100%);
      border: 4px solid rgba(255,255,255,.45);
      box-shadow: 0 18px 34px rgba(255, 44, 104, .24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      animation: pulseHeart 3.1s ease-in-out infinite;
    }

    .loader-text {
      margin-bottom: 20px;
      color: rgba(255,255,255,.95);
      font-family: 'Nunito', 'Quicksand', Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .2px;
      text-shadow: 0 0 20px rgba(255,255,255,.22);
    }

    .loader-bar {
      width: 100%;
      height: 12px;
      padding: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff5d92, #ffd1df, #7ff5e9);
      box-shadow: 0 0 18px rgba(255, 159, 189, .72);
      animation: loadingFill 5.2s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    @keyframes loadingFill {
      0% { width: 0%; }
      40% { width: 42%; }
      76% { width: 82%; }
      100% { width: 100%; }
    }

    .love-rain-screen {
      z-index: 115;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.10), transparent 38%),
        linear-gradient(135deg, rgba(22, 18, 34, .78), rgba(255, 44, 104, .38));
      transition: opacity 2.1s cubic-bezier(.22, 1, .36, 1), filter 2.3s ease, transform 2.3s ease;
    }

    .love-rain-screen.show {
      opacity: 1;
    }

    .rain-item {
      position: absolute;
      top: -14vh;
      left: 0;
      color: rgba(244, 252, 255, .76);
      font-family: 'Quicksand', 'Nunito', Arial, sans-serif;
      font-weight: 700;
      white-space: nowrap;
      text-shadow: 0 0 14px rgba(172, 245, 255, .72), 0 0 28px rgba(255, 155, 190, .24);
      filter: blur(.25px);
      animation: loveRainFall cubic-bezier(.33, .02, .21, 1) forwards;
      will-change: transform, opacity;
    }

    @keyframes loveRainFall {
      0% { transform: translate3d(0, -18vh, 0) rotate(-4deg) scale(.94); opacity: 0; }
      16% { opacity: .78; }
      72% { opacity: .70; }
      100% { transform: translate3d(var(--drift), 122vh, 0) rotate(5deg) scale(1.03); opacity: 0; }
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 22% 20%, rgba(255,255,255,.76) 0 9%, transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(255,159,189,.58) 0 12%, transparent 34%),
        linear-gradient(135deg, #ffe3eb 0%, #ffc0d2 46%, #ff91b5 100%);
      transition: opacity 2.2s cubic-bezier(.22, 1, .36, 1), transform 2.5s cubic-bezier(.22, 1, .36, 1), filter 2.5s cubic-bezier(.22, 1, .36, 1);
    }

    .intro-screen.intro-wait {
      opacity: 0;
      transform: scale(.92);
      filter: blur(10px);
      pointer-events: none;
    }

    .intro-screen.hide {
      opacity: 0;
      transform: scale(1.12);
      filter: blur(10px);
      pointer-events: none;
    }

    .intro-content {
      width: min(88vw, 430px);
      padding: 20px 10px;
      animation: introZoom 1.35s cubic-bezier(.22, 1, .36, 1) both;
    }

    .intro-heart {
      font-size: 74px;
      margin-bottom: 18px;
      filter: drop-shadow(0 14px 24px rgba(255, 44, 104, .25));
      animation: pulseHeart 2.5s ease-in-out infinite;
    }

    .intro-mini {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      margin-bottom: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 44, 104, .18);
      background: rgba(255,255,255,.38);
      color: #7a5060;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .intro-title {
      margin: 0 0 18px;
      font-family: 'Pacifico', cursive;
      font-size: 38px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--pink-deep);
      text-shadow: 0 3px 0 rgba(255,255,255,.56), 0 16px 30px rgba(255,44,104,.20);
    }

    .intro-text {
      max-width: 350px;
      margin: 0 auto 28px;
      color: #2c1b22;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.55;
    }

    @keyframes introZoom {
      from { opacity: 0; transform: scale(.86) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .soft-glow,
    .hearts,
    .balloons,
    .sparkle-layer {
      position: fixed;
      pointer-events: none;
    }

    .soft-glow {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.72), rgba(255,209,102,.26), rgba(255,44,104,.13), transparent 70%);
      z-index: 0;
      filter: blur(2px);
      animation: glowMove 12s ease-in-out infinite alternate;
    }

    .glow-one { left: -90px; top: 12%; }
    .glow-two {
      right: -95px;
      bottom: 9%;
      animation-delay: -4s;
      background: radial-gradient(circle, rgba(255,255,255,.66), rgba(127,245,233,.26), rgba(185,128,255,.17), transparent 70%);
    }

    @keyframes glowMove {
      from { transform: translateY(0) scale(1); opacity: .58; }
      to { transform: translateY(-26px) scale(1.13); opacity: .86; }
    }

    .hearts,
    .balloons,
    .sparkle-layer {
      inset: 0;
      overflow: hidden;
    }

    .hearts { z-index: 0; }
    .balloons { z-index: 1; }
    .sparkle-layer { z-index: 1; }

    .heart {
      position: absolute;
      color: rgba(255, 79, 134, .58);
      animation: float 14s linear infinite;
      font-size: 18px;
    }

    @keyframes float {
      from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: .7; }
      90% { opacity: .65; }
      to { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
    }

    .balloon {
      position: absolute;
      bottom: -120px;
      opacity: .46;
      animation: balloonUp 17s linear infinite;
      filter: drop-shadow(0 5px 0 rgba(0,0,0,.10));
    }

    @keyframes balloonUp {
      0% { transform: translateY(0) translateX(0) rotate(-4deg); opacity: 0; }
      12% { opacity: .46; }
      50% { transform: translateY(-55vh) translateX(22px) rotate(5deg); }
      100% { transform: translateY(-125vh) translateX(-18px) rotate(-5deg); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      color: rgba(255,255,255,.92);
      pointer-events: none;
      z-index: 1;
      animation: sparkleTwinkle 4.9s ease-in-out infinite;
      text-shadow: 0 0 12px rgba(255,255,255,.95);
    }

    @keyframes sparkleTwinkle {
      0%, 100% { opacity: .18; transform: scale(.82) rotate(0deg); }
      50% { opacity: .9; transform: scale(1.18) rotate(12deg); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(94vw, 760px);
      max-height: calc(100dvh - 118px);
      min-height: 270px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 30px clamp(18px, 4vw, 44px);
      text-align: center;
      border: 4px solid var(--ink);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.94), rgba(255,247,251,.90)),
        radial-gradient(circle at top left, rgba(255,209,102,.30), transparent 42%);
      box-shadow:
        12px 14px 0 var(--shadow),
        0 24px 55px rgba(115, 70, 140, .23),
        inset 0 0 0 1px rgba(255,255,255,.68);
      opacity: 0;
      transform: scale(.88) translateY(18px);
      backdrop-filter: blur(10px);
    }

    body.started .card {
      animation: pageZoomIn 1.45s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    @keyframes pageZoomIn {
      from { opacity: 0; transform: scale(.88) translateY(18px); filter: blur(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    .card > * { animation: contentFade .82s cubic-bezier(.22, 1, .36, 1) both; }

    @keyframes contentFade {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .progress {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      gap: 7px;
      max-width: 92vw;
      overflow: hidden;
      padding: 8px 11px;
      background: rgba(255, 255, 255, .52);
      border: 2px solid rgba(34,34,34,.16);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity .8s ease;
    }

    body.started .progress { opacity: 1; }

    .dot {
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 50%;
      background: rgba(255, 44, 104, .25);
      transition: transform .35s ease, background .35s ease;
    }

    .dot.active { background: var(--pink-deep); transform: scale(1.42); }

    .small-title {
      margin-bottom: 22px;
      color: var(--pink-deep);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    h1, h2, p { margin: 0; }

    h1 {
      margin-bottom: 28px;
      font-family: 'Nunito', 'Quicksand', Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -.25px;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,.72);
    }

    p {
      margin-bottom: 25px;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.45;
    }

    .typing {
      min-height: 86px;
      margin-bottom: 20px;
      font-size: 21px;
      font-weight: 500;
      line-height: 1.48;
    }

    button,
    .intro-btn {
      width: 100%;
      margin: 10px 0;
      padding: 15px 18px;
      border: 4px solid var(--ink);
      border-radius: 16px;
      font-family: 'Quicksand', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      box-shadow: 6px 7px 0 var(--shadow);
      transition: transform .24s ease, box-shadow .24s ease, filter .24s ease;
      position: relative;
      overflow: hidden;
    }

    .intro-btn { width: min(100%, 330px); }

    button::after,
    .intro-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.42), transparent);
      transform: translateX(-120%);
      transition: transform .75s ease;
    }

    button:hover::after,
    .intro-btn:hover::after { transform: translateX(120%); }

    button:hover,
    .intro-btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.06);
      box-shadow: 7px 9px 0 var(--shadow), 0 18px 28px rgba(255, 44, 104, .13);
    }

    button:active,
    .intro-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 3px 0 var(--shadow);
    }

    .pink, .intro-btn { background: linear-gradient(135deg, #ff2c68, #ff7aa2); color: white; }
    .green { background: linear-gradient(135deg, #22d56d, #70f0a6); color: white; }
    .white { background: linear-gradient(135deg, #ffffff, #fff0f6); color: var(--ink); }
    .cyan { background: linear-gradient(135deg, #18e4d2, #a8fff3); color: #111; }
    .purple { background: linear-gradient(135deg, #b980ff, #7b61ff); color: white; }

    .envelope-scene { padding: 8px 0 2px; cursor: pointer; animation: sceneSoftIn 1.05s cubic-bezier(.22, 1, .36, 1) both; }

    @keyframes sceneSoftIn {
      from { opacity: 0; transform: translateY(20px) scale(.96); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .gift-title {
      margin-bottom: 8px;
      font-family: 'Pacifico', cursive;
      font-size: 31px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--pink-deep);
      text-shadow: 0 3px 0 rgba(255,255,255,.62), 0 12px 24px rgba(255,44,104,.18);
      animation: softFloatTitle 3.2s ease-in-out infinite;
    }

    @keyframes softFloatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    .gift-subtitle { margin-bottom: 18px; color: #8f6671; font-size: 14px; font-weight: 500; letter-spacing: .4px; }
    .gift-caption { margin-bottom: 18px; color: #3a242b; font-size: 17px; animation: captionPulse 2.6s ease-in-out infinite; }
    @keyframes captionPulse { 0%, 100% { opacity: .78; } 50% { opacity: 1; } }

    .envelope-box {
      width: 250px;
      height: 170px;
      margin: 10px auto 24px;
      position: relative;
      perspective: 900px;
      animation: envelopeBreath 4.6s ease-in-out infinite;
      transition: transform .45s cubic-bezier(.22, 1, .36, 1), filter .45s ease;
    }

    .envelope-box:hover { transform: translateY(-5px) scale(1.02); filter: drop-shadow(0 10px 12px rgba(255,44,104,.18)); }
    @keyframes envelopeBreath { 0%, 100% { transform: translateY(0) rotate(-.4deg); } 50% { transform: translateY(-7px) rotate(.6deg); } }

    .letter-paper {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 42px;
      height: 105px;
      background: linear-gradient(180deg, #fff 0%, #fff4fb 55%, #ffe1ee 100%);
      border: 4px solid var(--ink);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-deep);
      font-size: 38px;
      z-index: 1;
      transition: transform 1.45s cubic-bezier(.22, 1, .36, 1), top 1.45s cubic-bezier(.22, 1, .36, 1);
    }

    .envelope-box.open .letter-paper { top: -56px; transform: translateY(-8px) scale(1.035); }

    .envelope-back,
    .envelope-front {
      position: absolute;
      inset: 0;
      border: 4px solid var(--ink);
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff, #ffeaf2);
      box-shadow: 7px 9px 0 var(--shadow), 0 18px 28px rgba(255,44,104,.13);
    }

    .envelope-back { z-index: 0; }

    .envelope-flap {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 88px;
      background: linear-gradient(145deg, #ffffff, #fff6c7 50%, #ffeaf2);
      border: 4px solid var(--ink);
      border-bottom: 0;
      border-radius: 14px 14px 0 0;
      transform-origin: top;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 4;
      transition: transform 1.35s cubic-bezier(.22, 1, .36, 1);
    }

    .envelope-box.open .envelope-flap { transform: rotateX(180deg); z-index: 0; }
    .envelope-front { z-index: 3; overflow: hidden; }

    .envelope-front::before,
    .envelope-front::after {
      content: '';
      position: absolute;
      bottom: -4px;
      width: 52%;
      height: 100%;
      background: linear-gradient(145deg, #ffffff, #ffeaf2 55%, #fff6c7);
      border-top: 4px solid var(--ink);
    }

    .envelope-front::before { left: -4px; transform: skewY(35deg); transform-origin: bottom left; }
    .envelope-front::after { right: -4px; transform: skewY(-35deg); transform-origin: bottom right; }

    .love-float {
      position: absolute;
      right: -10px;
      top: -34px;
      width: 62px;
      height: 62px;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #ffeaf2 55%, #fff6c7);
      box-shadow: 5px 6px 0 var(--shadow), 0 16px 24px rgba(255, 44, 104, .14);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-deep);
      font-size: 28px;
      animation: loveFloat 2.9s ease-in-out infinite;
    }

    .love-float.second {
      right: 42px;
      top: -18px;
      width: 34px;
      height: 34px;
      font-size: 16px;
      border-width: 3px;
      animation-delay: .55s;
      opacity: .95;
    }

    @keyframes loveFloat { 0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); } 50% { transform: translateY(-8px) rotate(4deg) scale(1.04); } }

    .photo-gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin: 0 auto 24px;
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 4 / 5;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: linear-gradient(135deg, #ffe6ee, #ffd1df 45%, #c9b6ff 100%);
      box-shadow: 7px 8px 0 var(--shadow), 0 18px 30px rgba(185,128,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-deep);
      font-size: 52px;
      overflow: hidden;
      position: relative;
      transform: rotate(-3deg);
    }

    .photo-frame:nth-child(2) {
      transform: rotate(3deg);
    }

    .photo-frame:nth-child(3) {
      transform: rotate(2deg);
    }

    .photo-frame:nth-child(4) {
      transform: rotate(-2deg);
    }

    .photo-frame::after {
      content: attr(data-caption);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 6px 10px;
      background: rgba(255,255,255,.78);
      color: #8f6671;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .4px;
      backdrop-filter: blur(6px);
    }

    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

    .letters {
      display: grid;
      grid-template-columns: repeat(4, 68px);
      gap: 14px;
      justify-content: center;
      margin: 20px 0 24px;
    }

    .letter {

        <h1>YEAYYY! 💖</h1>
        <p>Happy birthday, mas yang ke-24. Makasih sudah jadi orang yang spesial di hidup aku. Aku sayang kamu, hari ini, besok, dan seterusnya.</p>
        <button class="purple" onclick="virtualHug()">PELUK VIRTUAL</button>
        <button class="pink" onclick="next()">ADA HADIAH TERAKHIR 🎁</button>
      `,
      () => `
        <div class="small-title">FINAL GIFT REVEAL 🎁</div>
        <div class="gift-box-big">
          <div class="gift-ribbon"></div>
          <div class="gift-lid"></div>
          <div class="gift-body"></div>
        </div>
        <h1>ada hadiah terakhir nih... 🎁</h1>
        <p>tapi cuma bisa dibuka kalau kamu senyum dulu</p>
        <button class="pink" onclick="finalGiftReveal()">AKU UDAH SENYUM</button>
      `,
      () => `
        <div class="small-title">LAST BOSS ULTAH! ✨</div>
        <h1>Terakhir nih, tebak nomor WA pacar kamu<br>kalau bener, kirim kabar kalau kamu senyum hari ini!</h1>
        <input id="waInput" placeholder="+62 8xxxx" inputmode="numeric" />
        <button class="green" onclick="sendWA()">Kirim Ucapan Manis</button>
      `
    ];

    function safeStep(value) {
      const index = Number.isInteger(value) ? value : 0;
      return Math.min(Math.max(index, 0), screens.length - 1);
    }

    function render() {
      if (!Array.isArray(screens) || screens.length === 0) {
        app.innerHTML = '<h1>Oops</h1><p>Screen belum siap.</p>';
        return;
      }

      step = safeStep(step);
      const screen = screens[step];

      if (typeof screen !== 'function') {
        console.error('Screen tidak valid di index:', step, screen);
        step = 0;
        app.innerHTML = screens[0]();
        updateProgress();
        return;
      }

      clearTypingTimer();
      app.innerHTML = screen();
      updateProgress();
      app.scrollTop = 0;

      if (step === 3) typeMessage();
    }

    function next() {
      if (step >= screens.length - 1) {
        showFinalScreen();
        return;
      }
      step += 1;
      render();
    }

    function clearTypingTimer() {
      if (typingTimer) {
        clearInterval(typingTimer);
        typingTimer = null;
      }
    }

    function updateProgress() {
      const progress = document.getElementById('progress');
      if (!progress) return;
      progress.innerHTML = screens.map((_, i) => `<span class="dot ${i <= step ? 'active' : ''}"></span>`).join('');
    }

    function runPreIntro() {
      const preloader = document.getElementById('preloaderScreen');
      const rain = document.getElementById('loveRainScreen');
      const intro = document.getElementById('introScreen');
      const loaderText = document.getElementById('loaderText');

      setTimeout(() => {
        if (loaderText) loaderText.textContent = 'udah nih mass...';
      }, 4150);

      setTimeout(() => {
        if (preloader) preloader.classList.add('hide');
        if (rain) {
          createLoveRain();
          rain.classList.add('show');
        }
      }, 5550);

      setTimeout(() => {
        if (preloader) preloader.style.display = 'none';
      }, 7800);

      setTimeout(() => {
        if (rain) rain.classList.add('hide');
      }, 15100);

      setTimeout(() => {
        if (intro) intro.classList.remove('intro-wait');
      }, 16000);

      setTimeout(() => {
        if (rain) rain.style.display = 'none';
      }, 17600);
    }

    function createLoveRain() {
      const rain = document.getElementById('loveRainScreen');
      if (!rain || rain.dataset.ready === 'true') return;
      rain.dataset.ready = 'true';
      const words = ['I love you mas', 'happy birthday mas', '24', '♡', '✨', 'love you', 'for you'];
      const count = window.innerWidth < 560 ? 54 : 72;

      for (let i = 0; i < count; i++) {
        const item = document.createElement('div');
        item.className = 'rain-item';
        item.textContent = words[Math.floor(Math.random() * words.length)];
        item.style.left = Math.random() * 104 - 4 + 'vw';
        item.style.fontSize = (12 + Math.random() * (window.innerWidth < 560 ? 16 : 24)) + 'px';
        item.style.animationDuration = (10.5 + Math.random() * 4.8) + 's';
        item.style.animationDelay = (Math.random() * 3.8) + 's';
        item.style.setProperty('--drift', (Math.random() * 130 - 65) + 'px');
        item.style.opacity = String(.42 + Math.random() * .38);
        rain.appendChild(item);
      }
    }

    function startOpening() {
      const intro = document.getElementById('introScreen');
      if (intro) {
        intro.classList.add('hide');
        setTimeout(() => { intro.style.display = 'none'; }, 1800);
      }
      document.body.classList.add('started');
    }

    function nextTyping() { next(); }

    function openEnvelope() {
      if (!envelopeOpened) {
        playSfx('pop');
        envelopeOpened = true;
        render();
        setTimeout(() => celebrate(), 1250);
      } else {
        playSfx('ting');
        envelopeOpened = false;
        next();
      }
    }

    function typeMessage() {
      const text = `happy birthday yaa masss 🎂🤍 ga kerasa kamu udah 24 aja. aku cuma mau bilang, makasih udah jadi kamu yang selalu aku banggain. semoga di umur baru ini kamu makin bahagia, makin kuat, rezekinya makin lancar, dan semua yang kamu usahain pelan-pelan jadi nyata. i’m so proud of you, always 💗`;
      const target = document.getElementById('typingText');
      const btn = document.getElementById('typingBtn');
      if (!target || !btn) return;

      let i = 0;
      clearTypingTimer();
      typingTimer = setInterval(() => {
        if (i >= text.length) {
          clearTypingTimer();
          btn.style.display = 'block';
          return;
        }

        const char = text[i];
        target.textContent += char;
        if (char && char !== ' ' && i % 2 === 0) playTypingSfx();
        i += 1;
      }, 62);
    }

    function pickLetter(letter, el) {
      jawaban += letter;
      if (el) el.style.visibility = 'hidden';
      const answer = document.getElementById('answer');
      if (answer) answer.textContent = jawaban;
    }

    function checkWord() {
      if (jawaban === 'BIRTHDAY') {
        playSfx('ting');
        jawaban = '';
        next();
        return;
      }

      playSfx('pop');
      app.innerHTML = `
        <h1>💔</h1>
        <p>Aduh! Susunannya salah.<br>Pelan-pelan aja mas!</p>
        <button class="pink" onclick="jawaban=''; render();">ULANGI</button>
      `;
    }

    function sweetChoice(message) {
      playSfx('ting');
      const note = document.getElementById('choiceNote');
      if (note) note.textContent = message;
      celebrateMini();
      setTimeout(next, 950);
    }

    function moodChoice(message) {
      playSfx('ting');
      const note = document.getElementById('moodNote');
      if (note) note.textContent = message;
      celebrateMini();
      setTimeout(next, 1150);
    }

    function thisThatChoice(message) {
      playSfx('ting');
      const note = document.getElementById('thisThatNote');
      if (note) note.textContent = message;
      celebrateMini();
      setTimeout(next, 1150);
    }

    function revealSecret() {
      playSfx('sparkle');
      const box = document.getElementById('secretBox');
      const btn = document.getElementById('secretNextBtn');
      if (box) box.textContent = 'aku mungkin nggak selalu bisa bilang panjang-panjang, tapi aku beneran sayang dan bangga sama kamu. always 💗';
      if (btn) btn.style.display = 'block';
      celebrateMini();
    }

    function openWish(card, text) {
      playSfx('ting');
      if (!card) return;
      card.textContent = text;
      card.classList.add('opened');
      const rect = card.getBoundingClientRect();
      popAt(rect.left + rect.width / 2, rect.top + rect.height / 2, '✦');
    }

    function blowCandles() {
      const cake = document.getElementById('cakeBox');
      const msg = document.getElementById('wishMessage');
      const btn = document.getElementById('cakeNextBtn');
      if (!cake || cake.classList.contains('cake-blown')) return;
      playSfx('pop');
      cake.classList.add('cake-blown');
      setTimeout(() => {
        if (msg) msg.textContent = 'semoga semua doa kamu dikabulin satu-satu yaa 🤍';
        if (btn) btn.style.display = 'block';
        celebrate();
      }, 720);
    }

    function finalGiftReveal() {
      playSfx('sparkle');
      celebrateMini();
      setTimeout(next, 900);
    }

    function badClick() {
      playSfx('pop');
      toast.style.display = 'block';
      app.classList.remove('shake');
      void app.offsetWidth;
      app.classList.add('shake');
      popAt(window.innerWidth / 2, window.innerHeight / 2, '✦');
      setTimeout(() => { toast.style.display = 'none'; }, 1200);
    }

    function toggleLove() {
      const btn = document.getElementById('switchBtn');
      if (btn) {
        btn.textContent = 'ON ♡';
        btn.className = 'pink';
      }
      setTimeout(next, 700);
    }

    function sendWA() {
      const input = document.getElementById('waInput');
      const isi = input ? input.value.trim() : '';
      if (!isi) {
        badClick();
        return;
      }

      const pesan = encodeURIComponent(`Hai ${namaKamu}, aku sudah buka web ulang tahun dari kamu. Makasih ya, mas sayang kamu ❤️`);
      window.open(`https://wa.me/${nomorWA}?text=${pesan}`, '_blank');
      showFinalScreen();
      celebrate();
    }

    function showFinalScreen() {
      step = screens.length - 1;
      updateProgress();
      app.innerHTML = `
        <div class="mission-complete">mission complete</div>
        <p>you are loved, today and always. makasih yaa udah buka semuanya pelan-pelan. semoga hari ulang tahun kamu jadi sedikit lebih manis hari ini.</p>
        <div class="from-text">from: cella</div>
        <button class="purple" onclick="virtualHug()">PELUK VIRTUAL</button>
        <button class="pink" onclick="restartWeb()">PUTAR ULANG DARI AWAL</button>
      `;
    }

    function moveNo() {
      const btn = document.getElementById('noBtn');
      if (!btn) return;
      btn.style.position = 'fixed';
      btn.style.width = '130px';
      btn.style.left = Math.random() * (window.innerWidth - 150) + 'px';
      btn.style.top = Math.random() * (window.innerHeight - 70) + 'px';
    }

    function finishLove() { celebrate(); next(); }

    function virtualHug() {
      const h = document.createElement('div');
      h.className = 'hug';
      h.textContent = '🤗💗';
      document.body.appendChild(h);
      celebrate();
      setTimeout(() => h.remove(), 2100);
    }

    function popAt(x, y, emoji = '♡') {
      const p = document.createElement('div');
      p.className = 'tap-pop';
      p.textContent = emoji;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }

    function celebrateMini() {
      const emojis = ['♡', '✦', '⋆', '💗', '✨'];
      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          popAt(80 + Math.random() * Math.max(0, window.innerWidth - 160), 160 + Math.random() * Math.max(0, window.innerHeight - 320), emojis[Math.floor(Math.random() * emojis.length)]);
        }, i * 55);
      }
    }

    function celebrate() {
      playSfx('sparkle');
      const colors = ['#ff2c68', '#ff7aa2', '#18e4d2', '#ffd166', '#7b61ff', '#35d07f', '#ffffff'];
      for (let i = 0; i < 45; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = Math.random() * 1.6 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }
    }

    function startMusic() {
      if (!musicPlaying) {
        audioPlayer = new Audio(laguRomantis);
        audioPlayer.loop = true;
        audioPlayer.volume = 0.45;
        audioPlayer.play().catch(() => {
          alert('Musiknya belum bisa diputar. Pastikan file music.mp3 sudah satu folder dengan index.html');
        });
        musicPlaying = true;
      }
      next();
    }

    function getSfxCtx() {
      if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (sfxCtx.state === 'suspended') sfxCtx.resume();
      return sfxCtx;
    }

    function tone(freq, duration, type = 'sine', volume = .035, delay = 0) {
      const ctx = getSfxCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + delay + .015);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + delay + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + duration + .03);
    }

    function playSfx(kind) {
      try {
        if (kind === 'pop') tone(220, .16, 'triangle', .03);
        if (kind === 'ting') { tone(740, .12, 'sine', .028); tone(980, .18, 'sine', .022, .08); }
        if (kind === 'sparkle') { tone(880, .10, 'sine', .018); tone(1175, .14, 'sine', .014, .07); tone(1568, .16, 'sine', .012, .14); }
      } catch (e) {}
    }

    function playTypingSfx() {
      try {
        const ctx = getSfxCtx();
        const now = ctx.currentTime;

        const click = ctx.createOscillator();
        const clickGain = ctx.createGain();
        const clickFilter = ctx.createBiquadFilter();
        click.type = 'square';
        click.frequency.value = 950 + Math.random() * 180;
        clickFilter.type = 'bandpass';
        clickFilter.frequency.value = 1300;
        clickGain.gain.setValueAtTime(0.0001, now);
        clickGain.gain.linearRampToValueAtTime(0.018, now + 0.004);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.032);
        click.connect(clickFilter);
        clickFilter.connect(clickGain);
        clickGain.connect(ctx.destination);
        click.start(now);
        click.stop(now + 0.04);

        const thock = ctx.createOscillator();
        const thockGain = ctx.createGain();
        thock.type = 'triangle';
        thock.frequency.value = 150 + Math.random() * 35;
        thockGain.gain.setValueAtTime(0.0001, now);
        thockGain.gain.linearRampToValueAtTime(0.012, now + 0.006);
        thockGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
        thock.connect(thockGain);
        thockGain.connect(ctx.destination);
        thock.start(now);
        thock.stop(now + 0.07);
      } catch (e) {}
    }

    function restartWeb() {
      step = 0;
      jawaban = '';
      envelopeOpened = false;
      document.body.classList.add('started');
      render();
    }

    function makeHearts() {
      const box = document.getElementById('hearts');
      if (!box) return;
      for (let i = 0; i < 32; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = Math.random() > .55 ? '♡' : (Math.random() > .5 ? '💗' : '✦');
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDelay = Math.random() * 12 + 's';
        h.style.fontSize = (10 + Math.random() * 18) + 'px';
        box.appendChild(h);
      }
    }

    function makeBalloons() {
      const box = document.getElementById('balloons');
      if (!box) return;
      const items = ['♡','✦','💗','✨','⋆'];
      for (let i = 0; i < 10; i++) {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.textContent = items[i % items.length];
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDelay = Math.random() * 14 + 's';
        b.style.animationDuration = (15 + Math.random() * 8) + 's';
        b.style.fontSize = (26 + Math.random() * 20) + 'px';
        box.appendChild(b);
      }
    }

    function makeSparkles() {
      const icons = ['✦', '✧', '⋆', '✨'];
      for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = icons[i % icons.length];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDelay = Math.random() * 5 + 's';
        s.style.fontSize = (12 + Math.random() * 14) + 'px';
        document.body.appendChild(s);
      }
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('button') || e.target.closest('.letter') || e.target.closest('.envelope-box')) {
        popAt(e.clientX, e.clientY, Math.random() > .5 ? '♡' : '✦');
      }
    });

    function runTests() {
      console.assert(Array.isArray(screens), 'screens harus berupa array');
      console.assert(screens.length > 0, 'screens tidak boleh kosong');
      console.assert(screens.every(screen => typeof screen === 'function'), 'semua item screens harus function');
      console.assert(safeStep(-99) === 0, 'safeStep harus clamp index negatif ke 0');
      console.assert(safeStep(999) === screens.length - 1, 'safeStep harus clamp index terlalu besar ke screen terakhir');
      console.assert(typeof screens[0]() === 'string', 'screen pertama harus menghasilkan HTML string');
    }

    runTests();
    makeHearts();
    makeBalloons();
    makeSparkles();
    render();
    runPreIntro();
  </script>
</body>
</html>
